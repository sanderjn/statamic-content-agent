name: Content guardrails

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [main]

jobs:
  path-allowlist:
    name: Non-maintainer commits touch only content
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    env:
      MAINTAINER_EMAILS: "" # agentic:maintainer_emails — space-separated maintainer git emails, filled by `agentic:setup`
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail commits that change non-content paths
        env:
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Default-deny: every commit must touch only content, UNLESS its author
          # is a maintainer. The agent's git identity does not matter — anything
          # that is not a maintainer commit is held to the content allowlist.
          before="$PUSH_BEFORE"; after="$PUSH_AFTER"
          if [ "$before" = "0000000000000000000000000000000000000000" ]; then range="$after -n 1"; else range="$before..$after"; fi
          fail=0
          for commit in $(git rev-list $range); do
            author="$(git show -s --format='%ae' "$commit")"
            is_maintainer=0
            for email in $MAINTAINER_EMAILS; do [ "$author" = "$email" ] && is_maintainer=1 && break; done
            [ "$is_maintainer" -eq 1 ] && { echo "Skipping $commit (author $author is a maintainer)"; continue; }
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              if ! printf '%s' "$file" | bash .claude/hooks/guard-content-paths.sh >/dev/null 2>&1; then
                echo "::error::Commit $commit changes disallowed path: $file"
                fail=1
              fi
            done < <(git diff-tree --no-commit-id --name-only -r "$commit")
          done
          [ "$fail" -ne 0 ] && { echo "A non-maintainer commit touched files outside the content allowlist."; exit 1; }
          echo "All non-maintainer commits stay within the content allowlist."

  guard-release:
    name: Only a maintainer may land changes on main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      MAINTAINERS: "" # agentic:maintainers — space-separated GitHub usernames, filled by `agentic:setup`
    steps:
      - name: Fail if main was changed by anyone but a maintainer
        env:
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          [ -z "${MAINTAINERS// }" ] && { echo "::error::No maintainers configured. Run agentic:setup."; exit 1; }
          for m in $MAINTAINERS; do [ "$ACTOR" = "$m" ] && { echo "main updated by $ACTOR (maintainer) — ok"; exit 0; }; done
          echo "::error::main was updated by '$ACTOR', not a maintainer. Production-bound changes go through a reviewed PR, never a direct push or self-merge."
          exit 1

  validate-and-test:
    name: validate-and-test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: gd, exif
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Build frontend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build
      - name: Regenerate content catalog and fail if stale
        run: |
          php artisan content:catalog
          git diff --exit-code content/agent-reference.md
      - name: Validate content
        run: php artisan content:validate
      - name: Check code style
        run: |
          # scope to kit code; a fresh Statamic skeleton isn't pint-clean under the default preset
          if [ -x vendor/bin/pint ]; then vendor/bin/pint --test app tests; else echo "laravel/pint not installed — skipping code-style check."; fi
